- name: Check if file exists
  run: |
    if [ -f "publicFileIndex.json" ]; then
      echo "File exists, proceeding with commit"
      git add publicFileIndex.json
      git commit -m '由Actions自动生成插件市场所需JSON索引'
      git push
    else
      echo "File does not exist, skipping commit"
      # 可以选择创建一个空文件或者执行其他操作
      # touch publicFileIndex.json
      # git add publicFileIndex.json
      # git commit -m '创建空的索引文件'
      # git push
    fi
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
